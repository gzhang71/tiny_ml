name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # the gradient checks need float64, which both backends provide by
        # default; running both proves the backend abstraction holds
        backend: [numpy, jax]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ "${{ matrix.backend }}" = "jax" ]; then pip install -e ".[jax]"; fi

      - name: Run test suite
        env:
          TINY_PRE_TRAIN_BACKEND: ${{ matrix.backend }}
          TINY_PRE_TRAIN_JAX_X64: "1"
        run: python -m tests.run_all
